# Cookbook Subapp Integration Configuration
# This file defines how cookbook integrates with the portfolio app

meta:
  name: "Cookbook"
  slug: "cookbook"
  description: "Personal recipe collection and cooking management system"
  version: "1.0.0"

ui:
  icon: "🍳"
  color: "#FF6B35"

integration:
  # Where this subapp should be accessible
  frontend_path: "/cookbook"
  api_path: "/api/cookbook"
  admin_path: "/cookbook/admin"

  # Access control
  requires_auth: true
  admin_only: false
  show_in_menu: true
  menu_order: 10

  # Admin integration
  has_admin: true
  admin_iframe: true  # Use iframe for admin integration
  admin_title: "Recipe Management"

docker:
  # Images for deployment
  backend_image: "antonlu/cookbook-backend:latest"
  frontend_image: "antonlu/cookbook-frontend:latest"

  # Port configuration
  backend_port: 8001
  redis_db: 1

  # Environment variables needed
  environment:
    - "REDIS_URL=redis://redis:6379/1"
    - "DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/portfolio"
    - "SECRET_KEY=${SECRET_KEY}"
    - "SESSION_SECRET_KEY=${SESSION_SECRET_KEY}"
    - "CORS_ORIGINS=${CORS_ORIGINS}"

  # Volume mounts
  volumes:
    - "./cookbook_uploads:/app/uploads"

  # Dependencies
  depends_on:
    - "db"
    - "redis"

routing:
  # Nginx routing rules
  frontend:
    location: "/cookbook/"
    proxy_pass: "http://cookbook-frontend/"

  api:
    location: "/api/cookbook/"
    proxy_pass: "http://cookbook-backend:8000/api/"

  admin:
    location: "/cookbook/admin/"
    proxy_pass: "http://cookbook-frontend/admin/"

database:
  # Database setup (if separate schema needed)
  schema: "cookbook"  # Optional: use separate schema
  migrations: true    # Has its own migrations