# Development environment with live reload and nginx proxy
services:
  nginx:
    image: nginx:alpine
    container_name: cookbook-nginx
    volumes:
      - ./nginx/nginx.conf.dev:/etc/nginx/nginx.conf:ro
    ports:
      - "6002:80"
    depends_on:
      - app
      - frontend
    networks:
      - cookbook-network

  app:
    build:
      context: .
      args:
        BUILD_TYPE: development
    container_name: cookbook-app-dev
    volumes:
      - ./cookbook:/app/cookbook
      - ./.git:/app/.git
      - ./pyproject.toml:/app/pyproject.toml
      - ./README.md:/app/README.md
      - ./.env:/app/.env
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - COOKBOOK_DATABASE_HOST=db
      - COOKBOOK_DATABASE_PORT=5432
      - COOKBOOK_DATABASE_USER=cookbook
      - COOKBOOK_DATABASE_PASSWORD=cookbook
      - COOKBOOK_DATABASE_NAME=cookbook
      - COOKBOOK_REDIS_URL=redis://redis:6379/0
      - COOKBOOK_SECURITY_AUTH_BASE_URL=${COOKBOOK_SECURITY_AUTH_BASE_URL:-http://auth-broker:8000}
      - COOKBOOK_SECURITY_LOGIN_URL=${COOKBOOK_SECURITY_LOGIN_URL:-http://localhost/login}
      - COOKBOOK_SECURITY_REDIRECT_URI=${COOKBOOK_SECURITY_REDIRECT_URI:-http://localhost:6002/api/auth/callback}
    command: ["uvicorn", "cookbook.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/cookbook"]
    ports:
      - "6004:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      cookbook-network: {}
      first-party-auth-network:
        aliases:
          - cookbook-app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: cookbook-frontend-dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=/api
      - VITE_AUTH_BASE_URL=${VITE_AUTH_BASE_URL:-http://localhost}
      - VITE_AUTH_REDIRECT_URI=${VITE_AUTH_REDIRECT_URI:-http://localhost:6002/api/auth/callback}
    networks:
      cookbook-network: {}
      first-party-auth-network:
        aliases:
          - cookbook-frontend

  db:
    image: postgres:17-alpine
    container_name: cookbook-db-dev
    environment:
      - POSTGRES_USER=cookbook
      - POSTGRES_PASSWORD=cookbook
      - POSTGRES_DB=cookbook
    ports:
      - "5436:5432" # Different port to avoid conflicts
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookbook"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cookbook-network

  redis:
    image: redis:7-alpine
    container_name: cookbook-redis-dev
    networks:
      - cookbook-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  cookbook-network:
    driver: bridge
  first-party-auth-network:
    external: true
